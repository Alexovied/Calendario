<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Codificación de caracteres para soportar tildes y ñ -->
    <meta charset="UTF-8">
    <!-- Hacer que la página sea responsive en dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario</title>

    <!-- Fuente moderna de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Enlace a nuestro archivo de estilos CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Contenedor principal que centra todo el calendario -->
    <div class="app">

        <!-- Encabezado del calendario con título y subtítulo -->
        <header class="header">
            <h1 class="header__title">📅 Calendario</h1>
            <p class="header__subtitle" id="today-label">Hoy es ...</p>
        </header>

        <!-- Tarjeta principal del calendario -->
        <div class="calendar">

            <!-- Barra de navegación: mes anterior / mes y año / mes siguiente -->
            <nav class="calendar__nav">
                <!-- Botón para retroceder un mes -->
                <button class="calendar__nav-btn" id="prev-month" aria-label="Mes anterior">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>

                <!-- Muestra el mes y el año actual -->
                <div class="calendar__nav-center">
                    <span class="calendar__month" id="month">Marzo</span>
                    <span class="calendar__year" id="year">2026</span>
                </div>

                <!-- Botón para avanzar un mes -->
                <button class="calendar__nav-btn" id="next-month" aria-label="Mes siguiente">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </nav>

            <!-- Encabezado con los nombres de los días de la semana -->
            <div class="calendar__weekdays">
                <div class="calendar__weekday">Lun</div>
                <div class="calendar__weekday">Mar</div>
                <div class="calendar__weekday">Mié</div>
                <div class="calendar__weekday">Jue</div>
                <div class="calendar__weekday">Vie</div>
                <div class="calendar__weekday calendar__weekday--weekend">Sáb</div>
                <div class="calendar__weekday calendar__weekday--weekend">Dom</div>
            </div>

            <!-- Aquí se insertan dinámicamente los días del mes mediante JavaScript -->
            <div class="calendar__grid" id="dates"></div>

        </div>

        <!-- Leyenda inferior que explica los colores -->
        <div class="legend">
            <div class="legend__item">
                <span class="legend__dot legend__dot--today"></span>
                <span>Hoy</span>
            </div>
            <div class="legend__item">
                <span class="legend__dot legend__dot--holiday"></span>
                <span>Feriado</span>
            </div>
        </div>

    </div>

    <!-- Enlace al archivo JavaScript con la lógica del calendario -->
    <script src="js/script.js"></script>
</body>
</html>
